apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-whisper-tiny
  namespace: multi-agent
  labels:
    app: audio-whisper-tiny
    category: KARMA
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audio-whisper-tiny
  template:
    metadata:
      labels:
        app: audio-whisper-tiny
        category: KARMA
    spec:
      schedulerName: hami-scheduler
      containers:
      - name: audio-whisper-tiny
        image: ysf0kaya/hami-multi-agent:latest
        command: ["python3", "agents/audio_agent.py"]
        env:
        - name: MODEL_NAME
          value: "whisper-tiny"
        - name: AGENT_ID
          value: "audio-whisper-tiny"
        - name: BATCH_SIZE
          value: "32"
        - name: REPEAT
          value: "5"
        - name: DATASET_PATH
          value: "/data/dataset.csv"
        volumeMounts:
        - name: dataset-volume
          mountPath: /data
        resources:
          limits:
            nvidia.com/gpu: 1
            nvidia.com/gpumem: 512
          requests:
            memory: "2Gi"
            cpu: "500m"
      volumes:
      - name: dataset-volume
        hostPath:
          path: /tmp/hami-dataset
          type: DirectoryOrCreate

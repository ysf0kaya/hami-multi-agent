apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-agent
  namespace: multi-agent
  labels:
    app: cognitive-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cognitive-agent
  template:
    metadata:
      labels:
        app: cognitive-agent
    spec:
      schedulerName: hami-scheduler
      containers:
      - name: cognitive-agent
        image: ysf0kaya/hami-multi-agent:latest
        command: ["python3", "agents/cognitive_agent.py"]
        env:
        - name: AGENT_ID
          value: "cognitive-1"
        - name: MODEL_NAME
          value: "Qwen/Qwen1.5-0.5B"
        resources:
          limits:
            nvidia.com/gpu: 1
            nvidia.com/gpumem: 1536
          requests:
            memory: "2Gi"
            cpu: "500m"

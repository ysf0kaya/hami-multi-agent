apiVersion: apps/v1
kind: Deployment
metadata:
  name: observer-agent
  namespace: multi-agent
  labels:
    app: observer-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observer-agent
  template:
    metadata:
      labels:
        app: observer-agent
    spec:
      schedulerName: hami-scheduler
      containers:
      - name: observer-agent
        image: ysf0kaya/hami-multi-agent:latest
        command: ["python3", "agents/observer_agent.py"]
        env:
        - name: AGENT_ID
          value: "observer-1"
        resources:
          limits:
            nvidia.com/gpu: 1
            nvidia.com/gpumem: 512
          requests:
            memory: "512Mi"
            cpu: "250m"
